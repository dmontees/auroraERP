name: Build Aurora

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build DMG
      run: npm run electron:build:mac
      env:
        PUBLISH: never
      
    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: Aurora-macOS
        path: release/*.dmg

  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Build Windows
      run: npm run electron:build:win
      env:
        PUBLISH: never
      
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: Aurora-Windows
        path: release/*.exe